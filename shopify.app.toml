# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "2249b95ef317d4ad45ffa43f8e708420"
name = "BluePrintAI"
# Shopify CLI requires a concrete URL here and does not read SHOPIFY_APP_URL.
# Replace this sentinel with the exact deployed HTTPS origin before app deploy.
application_url = "https://blueprintai-app.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products"

[auth]
# Replace the sentinel with <SHOPIFY_APP_URL>/auth/callback before app deploy.
redirect_urls = [
  "https://blueprintai-app.onrender.com/auth/callback",
  "https://blueprintai-app.onrender.com/auth/shopify/callback",
  "https://blueprintai-app.onrender.com/api/auth/callback"
]
