# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "2249b95ef317d4ad45ffa43f8e708420"
name = "BluePrintAI"
# Development URLs are injected by Shopify CLI because automatically_update_urls_on_dev is true.
# Replace this placeholder with the exact deployed HTTPS origin before app deploy.
application_url = "https://blueprintai-app.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  compliance_topics = [
    "customers/data_request",
    "customers/redact",
    "shop/redact"
  ]
  uri = "/webhooks/compliance"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products"

[auth]
# The configured React Router Shopify SDK uses authPathPrefix = "/auth" and
# handles this callback through app/routes/auth.$.jsx.
redirect_urls = [
  "https://blueprintai-app.onrender.com/auth/callback"
]
